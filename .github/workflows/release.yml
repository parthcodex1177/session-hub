name: Release binaries

# Build a standalone single-file binary for Linux, macOS, and Windows on each
# version tag and attach them to the GitHub Release. The binaries need no
# Python or system libraries on the target machine — download & run.
on:
  push:
    tags: ["v*"]
  # Manual runs BUILD the binaries (downloadable as workflow artifacts) but do
  # NOT publish a Release — the release job below runs only for tag pushes.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Linux: build inside manylinux_2_28 (glibc 2.28) so the binary runs on any
  # distro with glibc >= 2.28 — Ubuntu 20.04+, Debian 10+, RHEL/CentOS 8+, etc.
  # Building on a normal runner links a newer glibc and breaks older machines.
  build-linux:
    name: Build (Linux, glibc 2.28+)
    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_28_x86_64
    steps:
      - uses: actions/checkout@v4
      - name: Build binary
        run: |
          # manylinux's bundled /opt/python is STATIC (no libpython.so), which
          # PyInstaller can't use. Install a shared-library Python from dnf
          # (linked against this image's glibc 2.28) and build with that.
          dnf install -y python3.12 python3.12-pip python3.12-devel
          PY=/usr/bin/python3.12
          "$PY" -m pip install --upgrade pip setuptools wheel
          "$PY" -m pip install ".[build]"
          "$PY" -m PyInstaller --clean --noconfirm session-hub.spec
          mv dist/session-hub dist/session-hub-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: session-hub-linux-x86_64
          path: dist/session-hub-linux-x86_64

  build-desktop:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            asset: session-hub-macos-arm64
          - os: windows-latest
            asset: session-hub-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build deps
        run: pip install -e ".[build]"
      - name: Build binary
        run: pyinstaller --clean --noconfirm session-hub.spec
      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: mv dist/session-hub "dist/${{ matrix.asset }}"
      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: Move-Item dist/session-hub.exe "dist/${{ matrix.asset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  release:
    name: Publish Release
    needs: [build-linux, build-desktop]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: List artifacts being released
        run: ls -la artifacts/
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
