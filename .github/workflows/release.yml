name: Release binaries

# Build a standalone single-file binary for Linux, macOS, and Windows whenever
# a version tag is pushed, and attach them to the GitHub Release. The binaries
# need no Python or system libraries on the target machine — download & run.
on:
  push:
    tags: ["v*"]
  # Manual runs BUILD the binaries (downloadable as workflow artifacts) but do
  # NOT publish a Release — the release job below runs only for tag pushes.
  workflow_dispatch:

permissions:
  contents: write           # needed to create/upload the Release

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Build on the OLDEST supported Ubuntu: a PyInstaller binary requires
          # a glibc >= the one it was built against, so building on 22.04
          # (glibc 2.35) lets it run on 22.04 and every newer release. Building
          # on ubuntu-latest (24.04, glibc 2.39) breaks on older machines.
          - os: ubuntu-22.04
            asset: session-hub-linux-x86_64
          - os: macos-latest
            asset: session-hub-macos-arm64
          - os: windows-latest
            asset: session-hub-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: pip install -e ".[build]"

      - name: Build binary
        run: pyinstaller --clean --noconfirm session-hub.spec

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: mv dist/session-hub "dist/${{ matrix.asset }}"

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: Move-Item dist/session-hub.exe "dist/${{ matrix.asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts being released
        run: ls -la artifacts/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
